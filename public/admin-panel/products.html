<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" />
    <title>Products Manager - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 opacity-0 transition-opacity duration-300">
 <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col fixed inset-y-0 left-0 z-50 shadow-2xl">
             <div class="p-8 flex items-center space-x-3 border-b border-gray-800">
                <img src="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" class="w-10 h-10 rounded-xl shadow-lg border border-gray-700" alt="Logo">
                <span class="font-bold text-xl tracking-tight text-white">Vishwa Admin</span>
            </div>
            
             <nav class="flex-grow p-6 space-y-2 mt-4 text-gray-400">
                <a href="index.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i> Dashboard
                </a>
                <a href="visual-editor.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="layout" class="mr-3 w-5 h-5"></i> Visual Editor
                </a>
                <a href="site-data.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="database" class="mr-3 w-5 h-5"></i> Page Manager
                </a>
                <div class="pt-4 pb-2 px-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest text-gray-700">Inventory & Team</div>
                <a href="home-slider.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="sliders" class="mr-3 w-5 h-5"></i> Home Slider
                </a>
                <a href="products.html" class="flex items-center px-4 py-3 rounded-xl bg-green-500/10 text-green-400 font-bold border-l-2 border-green-500 transition-all">
                    <i data-lucide="package" class="mr-3 w-5 h-5"></i> Innovations
                </a>
                <a href="team-members.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="users" class="mr-3 w-5 h-5"></i> Team Members
                </a>
                <a href="gallery-editor.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="image" class="mr-3 w-5 h-5"></i> Photo Gallery
                </a>
                <div class="pt-4 pb-2 px-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest text-gray-700">Support</div>
                <a href="videos.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="video" class="mr-3 w-5 h-5"></i> Video Media
                </a>
                <a href="contact-editor.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="phone" class="mr-3 w-5 h-5"></i> Contact Info
                </a>
            </nav>

            <div class="p-6 border-t border-gray-800">
                <button id="logoutBtn" class="w-full flex items-center justify-center px-4 py-3 bg-red-900/20 text-red-400 rounded-xl hover:bg-red-900/40 transition-all font-bold group">
                    <i data-lucide="log-out" class="mr-2 w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-grow ml-72 p-10">
            <header class="mb-12 flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-extrabold text-white">Innovations</h1>
                    <p class="text-gray-500 mt-2">Manage sustainable solutions and product inventory.</p>
                </div>
                <button onclick="openModal()" class="flex items-center space-x-2 bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-green-900/20">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span>Add New Innovation</span>
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="productList">
                <!-- Products dynamically loaded -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="productModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-gray-800 rounded-2xl border border-gray-700 w-full max-w-2xl overflow-y-auto max-h-[90vh] shadow-2xl">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800 sticky top-0 z-10">
                <h2 id="modalTitle" class="text-xl font-bold">Add Product</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="productForm" class="p-8 space-y-6">
                <input type="hidden" id="productId">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Product Name</label>
                        <input type="text" id="title" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Slug (URL identifier)</label>
                        <input type="text" id="slug" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="bio-cement-bricks">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Card Image URL</label>
                        <input type="text" id="cardImage" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Short Description (for Listing)</label>
                    <textarea id="shortDescription" required rows="2" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
                </div>

                <div class="border-t border-gray-700 pt-6">
                    <h3 class="font-bold text-gray-300 mb-4">Detailed Content</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Tagline</label>
                            <input type="text" id="tagline" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Innovating for tomorrow">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Long Description</label>
                            <textarea id="longDescription" rows="5" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500 resize-none" placeholder="Provide more details about this innovation..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end space-x-3 pt-4 sticky bottom-0 bg-gray-800 pb-2">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl border border-gray-700 hover:bg-gray-700 transition-all font-semibold">Cancel</button>
                    <button type="submit" id="saveBtn" class="px-8 py-3 rounded-xl bg-green-600 hover:bg-green-500 text-white font-bold transition-all shadow-lg flex items-center gap-2">
                        <span>Save Product</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-guard.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        const listContainer = document.getElementById('productList');
        const modal = document.getElementById('productModal');
        const form = document.getElementById('productForm');
        const saveBtn = document.getElementById('saveBtn');

        window.openModal = (product = null) => {
            modal.classList.remove('hidden');
            if (product) {
                document.getElementById('modalTitle').textContent = "Edit Product";
                document.getElementById('productId').value = product.id;
                document.getElementById('title').value = product.title;
                document.getElementById('slug').value = product.slug;
                document.getElementById('cardImage').value = product.cardImage;
                document.getElementById('shortDescription').value = product.shortDescription;
                document.getElementById('tagline').value = product.details?.tagline || '';
                document.getElementById('longDescription').value = product.details?.sections?.[0]?.content || '';
            } else {
                document.getElementById('modalTitle').textContent = "Add Product";
                form.reset();
                document.getElementById('productId').value = "";
            }
        };

        window.closeModal = () => modal.classList.add('hidden');

        async function loadProducts() {
            try {
                listContainer.innerHTML = `
                    <div class="animate-pulse bg-gray-800 h-64 rounded-2xl border border-gray-700"></div>
                    <div class="animate-pulse bg-gray-800 h-64 rounded-2xl border border-gray-700"></div>
                `;
                const querySnapshot = await getDocs(collection(db, 'products'));
                listContainer.innerHTML = '';
                
                if (querySnapshot.empty) {
                    listContainer.innerHTML = `
                        <div class="col-span-full py-20 text-center bg-gray-800 rounded-3xl border border-dashed border-gray-700">
                            <div class="w-16 h-16 bg-gray-900 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-gray-700">
                                <i data-lucide="package-search" class="w-8 h-8 text-gray-500"></i>
                            </div>
                            <h3 class="text-xl font-bold text-gray-300">No Innovations Found</h3>
                            <p class="text-gray-500 mt-2 mb-6">Start by adding your first product innovation.</p>
                            <button onclick="openModal()" class="text-green-400 hover:text-green-300 font-bold underline flex items-center gap-2 mx-auto">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i> Add Now
                            </button>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const p = { id: doc.id, ...doc.data() };
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden group hover:border-green-500/50 transition-all";
                    card.innerHTML = `
                        <div class="relative h-48 bg-gray-900 overflow-hidden">
                            <img src="${p.cardImage}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute bottom-2 right-2 bg-gray-900/80 px-2 py-1 rounded text-[8px] text-blue-400 font-mono border border-gray-700 max-w-[150px] truncate">
                                ${p.cardImage}
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold">${p.title}</h3>
                                <span class="bg-blue-900/40 text-blue-400 text-[10px] px-2 py-1 rounded uppercase font-bold tracking-wider border border-blue-500/20">${p.slug}</span>
                            </div>
                            <p class="text-gray-400 text-sm line-clamp-2 mb-6 h-10">${p.shortDescription}</p>
                            <div class="flex justify-end gap-2 p-2 bg-gray-900/50 rounded-xl">
                                <button onclick='openModal(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="p-2 hover:bg-blue-900/40 text-blue-400 rounded-lg transition-colors"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                                <button onclick="deleteProduct('${p.id}')" class="p-2 hover:bg-red-900/40 text-red-400 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error("Error loading products", error);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> <span>Saving...</span>';
            lucide.createIcons();

            const data = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value,
                cardImage: document.getElementById('cardImage').value,
                shortDescription: document.getElementById('shortDescription').value,
                details: {
                    tagline: document.getElementById('tagline').value,
                    mainImage: document.getElementById('cardImage').value,
                    sections: [
                        {
                            title: 'Details',
                            type: 'paragraph',
                            content: document.getElementById('longDescription').value
                        }
                    ]
                }
            };

            try {
                if (id) {
                    await setDoc(doc(db, 'products', id), data);
                } else {
                    await addDoc(collection(db, 'products'), data);
                }
                closeModal();
                loadProducts();
            } catch (error) {
                console.error("Error saving product", error);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<span>Save Product</span>';
                lucide.createIcons();
            }
        });

        window.deleteProduct = async (id) => {
            if (confirm("Delete this product?")) {
                await deleteDoc(doc(db, 'products', id));
                loadProducts();
            }
        };

        loadProducts();
        lucide.createIcons();
    </script>
</body>
</html>
