<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" />
    <title>Team Management - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 opacity-0 transition-opacity duration-300">
    <div class="flex min-h-screen">
        <!-- Sidebar placeholder -->
        <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col fixed inset-y-0 left-0 z-50 shadow-2xl">
             <div class="p-8 flex items-center space-x-3 border-b border-gray-800">
                <img src="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" class="w-10 h-10 rounded-xl shadow-lg border border-gray-700" alt="Logo">
                <span class="font-bold text-xl tracking-tight text-white">Vishwa Admin</span>
            </div>
            
              <nav class="flex-grow p-6 space-y-2 mt-4 text-gray-400">
                <a href="index.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i> Dashboard
                </a>
                <div class="pt-4 pb-2 px-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest text-gray-500">Management</div>
                <a href="home-slider.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="sliders" class="mr-3 w-5 h-5"></i> Home Slider
                </a>
                <a href="team-members.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="users" class="mr-3 w-5 h-5"></i> Team Members
                </a>
                <a href="gallery-editor.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="image" class="mr-3 w-5 h-5"></i> Photo Gallery
                </a>
                <a href="videos.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 hover:text-white transition-all">
                    <i data-lucide="video" class="mr-3 w-5 h-5"></i> Video Media
                </a>
            </nav>

            <div class="p-6 border-t border-gray-800">
                <button id="logoutBtn" class="w-full flex items-center justify-center px-4 py-3 bg-red-900/20 text-red-400 rounded-xl hover:bg-red-900/40 transition-all font-bold group">
                    <i data-lucide="log-out" class="mr-2 w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow ml-64 p-8">
            <header class="mb-10 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold">Team Management</h1>
                    <p class="text-gray-400">Add, edit or remove company team members.</p>
                </div>
                <button onclick="openModal()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center">
                    <i data-lucide="user-plus" class="mr-2"></i> Add Team Member
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="teamList">
                <!-- Team cards will be injected here -->
                <div class="animate-pulse bg-gray-800 h-64 rounded-2xl border border-gray-700"></div>
                <div class="animate-pulse bg-gray-800 h-64 rounded-2xl border border-gray-700"></div>
                <div class="animate-pulse bg-gray-800 h-64 rounded-2xl border border-gray-700"></div>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="memberModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-gray-800 rounded-2xl border border-gray-700 w-full max-w-xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-bold">Add Team Member</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="memberForm" class="p-8 space-y-6">
                <input type="hidden" id="memberId">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Full Name</label>
                        <input type="text" id="name" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Position</label>
                        <input type="text" id="position" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Image URL</label>
                    <input type="text" id="imageUrl" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Description (Optional)</label>
                    <textarea id="description" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Order (Sorting)</label>
                    <input type="number" id="order" required value="0" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl border border-gray-700 hover:bg-gray-700 transition-all font-semibold">Cancel</button>
                    <button type="submit" class="px-8 py-3 rounded-xl bg-green-600 hover:bg-green-500 text-white font-bold transition-all shadow-lg">Save Member</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-guard.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        function handleFirestoreError(error, operationType, path) {
            const errInfo = {
                error: error instanceof Error ? error.message : String(error),
                authInfo: {
                    userId: window.authReadyUser?.uid || null,
                    email: window.authReadyUser?.email || null,
                },
                operationType,
                path
            };
            console.error('Firestore Error: ', JSON.stringify(errInfo));
            alert("Failed to save: " + error.message + "\n\nTry logging in again if this persists.");
            throw new Error(JSON.stringify(errInfo));
        }

        const listContainer = document.getElementById('teamList');
        const modal = document.getElementById('memberModal');
        const form = document.getElementById('memberForm');

        window.openModal = (member = null) => {
            modal.classList.remove('hidden');
            if (member) {
                document.getElementById('modalTitle').textContent = "Edit Team Member";
                document.getElementById('memberId').value = member.id;
                document.getElementById('name').value = member.name;
                document.getElementById('position').value = member.position;
                document.getElementById('imageUrl').value = member.imageUrl || '';
                document.getElementById('description').value = member.description || '';
                document.getElementById('order').value = member.order;
            } else {
                document.getElementById('modalTitle').textContent = "Add Team Member";
                form.reset();
                document.getElementById('memberId').value = "";
            }
        };

        window.closeModal = () => modal.classList.add('hidden');

        async function loadTeam() {
            try {
                const q = query(collection(db, 'team_members'), orderBy('order', 'asc'));
                const querySnapshot = await getDocs(q);
                listContainer.innerHTML = '';

                if (querySnapshot.empty) {
                    listContainer.innerHTML = `
                        <div class="col-span-full py-20 text-center bg-gray-800 rounded-3xl border border-dashed border-gray-700">
                            <div class="w-16 h-16 bg-gray-900 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-gray-700">
                                <i data-lucide="users" class="w-8 h-8 text-gray-500"></i>
                            </div>
                            <h3 class="text-xl font-bold text-gray-300">No Team Members Found</h3>
                            <p class="text-gray-500 mt-2">Create your team profile to showcase on the site.</p>
                            <button onclick="openModal()" class="text-green-400 hover:text-green-300 font-bold underline mt-4 flex items-center gap-2 mx-auto">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i> Add First Member
                            </button>
                        </div>
                    `;
                }

                querySnapshot.forEach((doc) => {
                    const member = { id: doc.id, ...doc.data() };
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-lg group";
                    card.innerHTML = `
                        <div class="relative h-48 overflow-hidden bg-gray-900 group">
                             <img src="${member.imageUrl || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                             <div class="absolute bottom-2 right-2 bg-gray-900/80 px-2 py-1 rounded text-[8px] text-blue-400 font-mono border border-gray-700 max-w-[150px] truncate">
                                ${member.imageUrl || 'No URL'}
                             </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold">${member.name}</h3>
                            <p class="text-green-400 font-medium text-sm mb-2">${member.position}</p>
                            <p class="text-gray-400 text-sm line-clamp-2 mb-4">${member.description || 'No description provided.'}</p>
                            <div class="flex justify-between items-center pt-4 border-t border-gray-700">
                                <span class="text-xs text-gray-500">Order: ${member.order}</span>
                                <div class="flex space-x-2">
                                    <button onclick='openModal(${JSON.stringify(member).replace(/'/g, "&apos;")})' class="p-2 hover:bg-gray-700 rounded-lg text-blue-400 transition-all"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                    <button onclick="deleteMember('${member.id}')" class="p-2 hover:bg-red-900/40 rounded-lg text-red-400 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error("Error loading team", error);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('memberId').value;
            const data = {
                name: document.getElementById('name').value,
                position: document.getElementById('position').value,
                imageUrl: document.getElementById('imageUrl').value,
                description: document.getElementById('description').value,
                order: parseInt(document.getElementById('order').value)
            };

            try {
                if (id) {
                    await setDoc(doc(db, 'team_members', id), data);
                } else {
                    await addDoc(collection(db, 'team_members'), data);
                }
                closeModal();
                loadTeam();
            } catch (error) {
                handleFirestoreError(error, 'write', 'team_members');
            }
        });

        window.deleteMember = async (id) => {
            if (confirm("Are you sure you want to remove this team member?")) {
                try {
                    await deleteDoc(doc(db, 'team_members', id));
                    loadTeam();
                } catch (error) {
                    console.error("Error deleting", error);
                }
            }
        };

        loadTeam();
        lucide.createIcons();
    </script>
</body>
</html>
