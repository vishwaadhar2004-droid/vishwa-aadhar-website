<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" />
    <title>Photo Gallery Manager - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <script src="js/admin-security.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-6 opacity-0 transition-opacity duration-300">
    <div class="flex min-h-screen">
        <!-- Main Content -->
        <main class="flex-grow p-10 max-w-7xl mx-auto w-full">
            <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <a href="index.html" class="flex items-center gap-2 text-gray-500 hover:text-white transition-all text-sm font-bold uppercase tracking-widest">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
                        </a>
                    </div>
                    <h1 class="text-4xl font-extrabold text-white">Media Gallery</h1>
                    <p class="text-gray-500 mt-2">Add or remove photos from your website showcases.</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleHeaderModal()" class="bg-gray-800 hover:bg-gray-700 text-purple-400 font-bold py-4 px-8 rounded-2xl border border-gray-700 shadow-xl transition-all flex items-center gap-2">
                        <i data-lucide="settings" class="w-5 h-5"></i> Page Header
                    </button>
                    <button onclick="openModal()" class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition-all transform hover:scale-[1.02] flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i> Add New Image
                    </button>
                </div>
            </header>

            <!-- Header Content Preview -->
            <div class="bg-gray-800 rounded-3xl border border-gray-700 p-8 mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h2 id="headerTitleView" class="text-2xl font-bold text-white mb-2">Gallery & Media</h2>
                    <p id="headerDescView" class="text-gray-400">Loading header info...</p>
                </div>
                <div class="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-purple-500 bg-purple-900/20 px-4 py-2 rounded-full">
                    <i data-lucide="info" class="w-4 h-4"></i> Page Header Live
                </div>
            </div>

            <div id="galleryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Gallery items will be injected here -->
                <div class="col-span-full py-32 text-center bg-gray-800/50 rounded-[3rem] border border-dashed border-gray-700">
                    <i data-lucide="cloud-lightning" class="w-16 h-16 text-gray-700 mx-auto mb-4"></i>
                    <p class="text-gray-500">Loading your visual story...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Page Header -->
    <div id="headerModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-gray-800 w-full max-w-xl rounded-[2.5rem] border border-gray-700 overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-gray-700 flex justify-between items-center bg-purple-900/10">
                <h3 class="text-2xl font-bold">Edit Gallery Header</h3>
                <button onclick="toggleHeaderModal()" class="text-gray-500 hover:text-white transition-all"><i data-lucide="x"></i></button>
            </div>
            <form id="headerForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-3 uppercase tracking-widest text-[10px]">Page Title</label>
                    <input type="text" id="headerTitle" required class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-purple-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-3 uppercase tracking-widest text-[10px]">Page Description</label>
                    <textarea id="headerDescription" required rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-purple-500 outline-none resize-none transition-all"></textarea>
                </div>
                <div class="flex justify-end gap-4 pt-4">
                    <button type="button" onclick="toggleHeaderModal()" class="px-8 py-4 rounded-xl text-gray-400 hover:text-white font-bold">Cancel</button>
                    <button type="submit" id="saveHeaderBtn" class="px-12 py-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-2xl shadow-xl transition-all">Update Header</button>
                 </div>
            </form>
        </div>
    </div>

    <!-- Modal for Adding/Editing -->
    <div id="mediaModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-gray-800 w-full max-w-xl rounded-[2.5rem] border border-gray-700 overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-gray-700 flex justify-between items-center bg-purple-900/10">
                <h3 id="modalTitle" class="text-2xl font-bold">Add to Gallery</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white transition-all"><i data-lucide="x"></i></button>
            </div>
            <form id="mediaForm" class="p-8 space-y-6">
                <input type="hidden" id="mediaId">
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-3 uppercase tracking-widest text-[10px]">Image URL (Unsplash/ImgBB/PostImg)</label>
                    <input type="text" id="imageUrl" required class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-purple-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-3 uppercase tracking-widest text-[10px]">Short Caption / Category</label>
                    <input type="text" id="caption" required class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. Factory Floor, Lab Visit">
                </div>
                <div class="flex justify-end gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="px-8 py-4 rounded-xl text-gray-400 hover:text-white font-bold">Cancel</button>
                    <button type="submit" id="saveBtn" class="px-12 py-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-2xl shadow-xl transition-all">Save Image</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { firebaseConfig } from "./js/config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app); // Simplified initialization
        const auth = getAuth(app);

        function handleFirestoreError(error, operationType, path) {
            const errInfo = {
                error: error instanceof Error ? error.message : String(error),
                authInfo: {
                    userId: auth.currentUser?.uid,
                    email: auth.currentUser?.email,
                    emailVerified: auth.currentUser?.emailVerified,
                    isAnonymous: auth.currentUser?.isAnonymous,
                    providerInfo: auth.currentUser?.providerData?.map(provider => ({
                        providerId: provider.providerId,
                        email: provider.email,
                    })) || []
                },
                operationType,
                path
            };
            console.error('Firestore Error: ', JSON.stringify(errInfo));
            alert("Failed to save: " + error.message + "\n\nAuth Debug: " + JSON.stringify(errInfo.authInfo));
            throw new Error(JSON.stringify(errInfo));
        }

        document.body.classList.remove('opacity-0');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                console.log("Logged in as:", user.email, "UID:", user.uid);
                // Display email in the header or somewhere
                const emailBadge = document.createElement('div');
                emailBadge.className = "text-xs text-gray-500 mt-1";
                emailBadge.textContent = "Admin: " + user.email;
                document.querySelector('header h1').after(emailBadge);
            }
        });

        const grid = document.getElementById('galleryGrid');
        const modal = document.getElementById('mediaModal');
        const form = document.getElementById('mediaForm');
        const headerModal = document.getElementById('headerModal');
        const headerForm = document.getElementById('headerForm');

        window.toggleHeaderModal = () => headerModal.classList.toggle('hidden');
        
        async function loadHeader() {
            try {
                const docSnap = await getDoc(doc(db, 'gallery_page', 'content'));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('headerTitleView').textContent = data.title || 'Gallery & Media';
                    document.getElementById('headerDescView').textContent = data.description || 'Visual stories and highlights.';
                    document.getElementById('headerTitle').value = data.title || '';
                    document.getElementById('headerDescription').value = data.description || '';
                }
            } catch (error) {
                console.error("Header load failed", error);
            }
        }

        headerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveHeaderBtn');
            btn.disabled = true;
            btn.textContent = "Updating...";
            
            try {
                await setDoc(doc(db, 'gallery_page', 'content'), {
                    title: document.getElementById('headerTitle').value,
                    description: document.getElementById('headerDescription').value,
                    updatedAt: new Date().toISOString()
                }, { merge: true });
                toggleHeaderModal();
                loadHeader();
            } catch (error) {
                console.error(error);
                alert("Header update failed");
            } finally {
                btn.disabled = false;
                btn.textContent = "Update Header";
            }
        });

        window.openModal = (media = null) => {
            modal.classList.remove('hidden');
            if (media) {
                document.getElementById('modalTitle').textContent = "Edit Media";
                document.getElementById('mediaId').value = media.id;
                document.getElementById('imageUrl').value = media.url;
                document.getElementById('caption').value = media.caption;
            } else {
                document.getElementById('modalTitle').textContent = "Add to Gallery";
                form.reset();
                document.getElementById('mediaId').value = "";
            }
        };

        window.closeModal = () => modal.classList.add('hidden');

        async function loadGallery() {
            try {
                const querySnapshot = await getDocs(collection(db, 'gallery_media'));
                grid.innerHTML = '';
                
                if (querySnapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full py-20 text-center text-gray-600 border border-dashed border-gray-800 rounded-[3rem]">No photos yet. Let your audience see your work!</div>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const item = { id: docSnap.id, ...docSnap.data() };
                    const card = document.createElement('div');
                    card.className = "group relative bg-gray-900 aspect-square rounded-[2rem] overflow-hidden border border-gray-800 shadow-xl";
                    card.innerHTML = `
                        <img src="${item.url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 opacity-60 group-hover:opacity-100">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent flex flex-col justify-end p-6 translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                            <h4 class="font-bold text-white mb-2">${item.caption}</h4>
                            <div class="flex gap-2">
                                <button onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="p-2 bg-purple-600/80 rounded-lg text-white hover:bg-purple-500 transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteImage('${item.id}')" class="p-2 bg-red-600/80 rounded-lg text-white hover:bg-red-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error("Gallery failed", error);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('mediaId').value;
            const data = {
                url: document.getElementById('imageUrl').value,
                caption: document.getElementById('caption').value,
                updatedAt: new Date().toISOString()
            };

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = "Publishing...";

            try {
                if (id) {
                    await setDoc(doc(db, 'gallery_media', id), data, { merge: true });
                } else {
                    data.createdAt = new Date().toISOString();
                    await addDoc(collection(db, 'gallery_media'), data);
                }
                closeModal();
                loadGallery();
            } catch (error) {
                handleFirestoreError(error, 'write', 'gallery_media');
            } finally {
                btn.disabled = false;
                btn.textContent = "Save Image";
            }
        });

        window.deleteImage = async (id) => {
            if (confirm("Permanently erase this memory from the website?")) {
                await deleteDoc(doc(db, 'gallery_media', id));
                loadGallery();
            }
        }

        loadGallery();
        loadHeader();
        lucide.createIcons();
    </script>
</body>
</html>
