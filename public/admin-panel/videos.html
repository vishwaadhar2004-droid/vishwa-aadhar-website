<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" />
    <title>Videos Manager - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 opacity-0 transition-opacity duration-300">
    <div class="flex min-h-screen">
        <!-- Sidebar placeholder -->
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col fixed inset-y-0 left-0">
             <div class="p-6 flex items-center space-x-3 border-b border-gray-700">
                <img src="https://i.postimg.cc/jjytpyMC/Whats-App-Image-2025-09-14-at-11-47-48-PM.jpg" class="w-8 h-8 rounded" alt="Logo">
                <span class="font-bold text-lg">Admin Panel</span>
            </div>
             <nav class="flex-grow p-4 space-y-2 mt-4">
                <a href="index.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition-all">
                    <i data-lucide="layout-dashboard" class="mr-3 w-5"></i> Dashboard
                </a>
                <div class="pt-4 pb-2 px-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest text-gray-500">Management</div>
                <a href="home-slider.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition-all text-gray-100">
                    <i data-lucide="sliders" class="mr-3 w-5"></i> Home Slider
                </a>
                <a href="team-members.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition-all">
                    <i data-lucide="users" class="mr-3 w-5"></i> Team Members
                </a>
                <a href="gallery-editor.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition-all">
                    <i data-lucide="image" class="mr-3 w-5"></i> Photo Gallery
                </a>
                <a href="videos.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition-all bg-gray-700 text-green-400 border-l-4 border-green-500">
                    <i data-lucide="video" class="mr-3 w-5"></i> Video Media
                </a>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center px-4 py-2 text-red-400 hover:bg-red-900/20 rounded-lg transition-all">
                    <i data-lucide="log-out" class="mr-2 w-4"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow ml-64 p-8">
            <header class="mb-10 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold">Videos Manager</h1>
                    <p class="text-gray-400">Share your journey through video content.</p>
                </div>
                <button onclick="openModal()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center">
                    <i data-lucide="video" class="mr-2"></i> Add Video
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="videoList">
                <!-- Videos here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="videoModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-gray-800 rounded-2xl border border-gray-700 w-full max-w-lg shadow-2xl">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-bold">Add Video</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="videoForm" class="p-8 space-y-6">
                <input type="hidden" id="videoId">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Video Title</label>
                    <input type="text" id="title" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Video Source (YouTube or Instagram URL)</label>
                    <input type="url" id="youtubeUrl" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="https://www.youtube.com/... or https://www.instagram.com/reels/...">
                    <div id="urlStatus" class="mt-2 text-[10px] font-bold uppercase tracking-wider hidden"></div>
                </div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl border border-gray-700 hover:bg-gray-700 transition-all font-semibold">Cancel</button>
                    <button type="submit" class="px-8 py-3 rounded-xl bg-green-600 hover:bg-green-500 text-white font-bold transition-all shadow-lg">Save Video</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-guard.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        const listContainer = document.getElementById('videoList');
        const modal = document.getElementById('videoModal');
        const form = document.getElementById('videoForm');

        const urlInput = document.getElementById('youtubeUrl');
        const statusDiv = document.getElementById('urlStatus');

        urlInput.addEventListener('input', () => {
            const url = urlInput.value;
            statusDiv.classList.remove('hidden');
            if (!url) {
                statusDiv.classList.add('hidden');
                return;
            }

            const ytRegExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const instaRegExp = /(?:https?:\/\/)?(?:www\.)?instagram\.com\/(?:p|reels?|reel|tv)\/([^/?#&]+)/;

            if (url.match(ytRegExp) && url.match(ytRegExp)[2].length === 11) {
                statusDiv.textContent = '✓ Supported YouTube Video';
                statusDiv.className = 'mt-2 text-[10px] font-bold uppercase tracking-wider text-green-500';
            } else if (url.match(instaRegExp)) {
                statusDiv.textContent = '✓ Supported Instagram Content';
                statusDiv.className = 'mt-2 text-[10px] font-bold uppercase tracking-wider text-blue-500';
            } else {
                statusDiv.textContent = '✗ Unsupported or invalid URL';
                statusDiv.className = 'mt-2 text-[10px] font-bold uppercase tracking-wider text-red-500';
            }
        });

        window.openModal = (video = null) => {
            modal.classList.remove('hidden');
            statusDiv.classList.add('hidden');
            if (video) {
                document.getElementById('modalTitle').textContent = "Edit Video";
                document.getElementById('videoId').value = video.id;
                document.getElementById('title').value = video.title;
                document.getElementById('youtubeUrl').value = video.youtubeUrl;
            } else {
                document.getElementById('modalTitle').textContent = "Add Video";
                form.reset();
                document.getElementById('videoId').value = "";
            }
        };

        window.closeModal = () => modal.classList.add('hidden');

        async function loadVideos() {
            try {
                const querySnapshot = await getDocs(collection(db, 'videos'));
                listContainer.innerHTML = '';
                
                if (querySnapshot.empty) {
                    listContainer.innerHTML = `
                        <div class="col-span-full py-20 text-center bg-gray-800 rounded-3xl border border-dashed border-gray-700">
                             <div class="w-16 h-16 bg-gray-900 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-gray-700">
                                <i data-lucide="video-off" class="w-8 h-8 text-gray-500"></i>
                            </div>
                            <h3 class="text-xl font-bold text-gray-300">No Videos Uploaded</h3>
                            <p class="text-gray-500 mt-2">Connect your YouTube journey here.</p>
                        </div>
                    `;
                }

                querySnapshot.forEach((doc) => {
                    const v = { id: doc.id, ...doc.data() };
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-lg";
                    card.innerHTML = `
                        <div class="relative aspect-video bg-gray-900 group border-b border-gray-700">
                             <div class="absolute inset-0 flex items-center justify-center">
                                <i data-lucide="play-circle" class="w-12 h-12 text-green-500/50 group-hover:scale-125 transition-transform duration-300"></i>
                             </div>
                             <div class="absolute bottom-2 right-2 bg-gray-900/80 px-2 py-1 rounded text-[8px] text-gray-400 font-mono border border-gray-700 max-w-[150px] truncate">
                                ${v.youtubeUrl}
                             </div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-lg mb-4 truncate">${v.title}</h3>
                            <div class="flex justify-between items-center pt-4 border-t border-gray-700">
                                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Active Link</span>
                                <div class="flex space-x-2">
                                    <button onclick='openModal(${JSON.stringify(v).replace(/'/g, "&apos;")})' class="p-2 hover:bg-blue-900/40 text-blue-400 rounded-lg transition-all"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                    <button onclick="deleteVideo('${v.id}')" class="p-2 hover:bg-red-900/40 text-red-400 rounded-lg transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error(error);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('videoId').value;
            const data = {
                title: document.getElementById('title').value,
                youtubeUrl: document.getElementById('youtubeUrl').value
            };
            try {
                if (id) await setDoc(doc(db, 'videos', id), data);
                else await addDoc(collection(db, 'videos'), data);
                alert("Success: Video saved!");
                closeModal();
                loadVideos();
            } catch (error) { 
                console.error(error); 
                alert("Error: " + error.message);
            }
        });

        window.deleteVideo = async (id) => {
            if (confirm("Delete this video?")) {
                await deleteDoc(doc(db, 'videos', id));
                loadVideos();
            }
        };

        loadVideos();
        lucide.createIcons();
    </script>
</body>
</html>
